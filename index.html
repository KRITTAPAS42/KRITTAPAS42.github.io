<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #3a7bd5, #00d2ff);
  height: 100vh;
  overflow: hidden;
  color: white;
}

/* FULL SCREEN */
.phone {
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* GRID 3 x 4 */
.grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 18px;
  padding: 20px;
}

/* APP */
.app {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: white;
}

.icon {
  width: 75px;
  height: 75px;
  border-radius: 20px;
  overflow: hidden; /* important for image */
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.15s;
}

/* IMAGE INSIDE ICON */
.icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* PRESS EFFECT */
.app:active .icon {
  transform: scale(0.9);
}

.label {
  font-size: 13px;
  margin-top: 6px;
  text-align: center;
}

/* DOCK */
.dock {
  height: 90px;
  margin: 12px;
  border-radius: 25px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
  display: flex;
  justify-content: space-around;
  align-items: center;
}

.dock .icon {
  width: 65px;
  height: 65px;
}
</style>
</head>
